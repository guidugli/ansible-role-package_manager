---
- name: Prepare containers for systemd
  hosts: all
  gather_facts: false
  become: false
  tasks:
    - name: Detect OS
      ansible.builtin.raw: cat /etc/os-release
      register: osr
      changed_when: false

    - name: Bootstrap Debian/Ubuntu
      ansible.builtin.raw: >-
        /bin/sh -c 'set -e;
        export DEBIAN_FRONTEND=noninteractive;
        apt-get update;
        apt-get install -y --no-install-recommends
        python3 python3-apt systemd systemd-sysv dbus ca-certificates iproute2'
      when: "'ID=debian' in osr.stdout or 'ID=ubuntu' in osr.stdout"
      changed_when: true

    - name: Bootstrap Fedora
      ansible.builtin.raw: >-
        /bin/sh -c 'set -e;
        dnf -y install python3 python3-dnf systemd dbus ca-certificates iproute'
      when: "'ID=fedora' in osr.stdout"
      changed_when: true

    - name: Detect systemd binary path inside container
      ansible.builtin.raw: >-
        /bin/sh -c 'set -e;
        if [ -x /lib/systemd/systemd ]; then echo /lib/systemd/systemd;
        elif [ -x /usr/lib/systemd/systemd ]; then echo /usr/lib/systemd/systemd;
        elif [ -x /sbin/init ]; then echo /sbin/init;
        else echo ""; fi'
      register: systemd_path
      changed_when: false

    - name: Fail if systemd binary was not found after install
      ansible.builtin.assert:
        that:
          - (systemd_path.stdout | trim | length) > 0
        fail_msg: systemd binary not found after install. Check package install output.
        quiet: true

- name: Check for role extra tasks
  hosts: all
  gather_facts: false
  tasks:
    - name: Include shared prepare tasks if present
      ansible.builtin.include_tasks: ../shared/prepare_tasks.yml
      when: lookup('ansible.builtin.fileglob', '../shared/prepare_tasks.yml', wantlist=True) | length > 0
