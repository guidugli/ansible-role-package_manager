---
- name: Update zypper cache
  community.general.zypper:
    name: '*'
    update_cache: true
  changed_when: false
  tags:
    - package_manager
    - install

- name: Update all zypper packages
  community.general.zypper:
    name: '*'
    state: latest
  when: pm_update_system
  tags:
    - package_manager
    - install

- name: Install zypper packages
  community.general.zypper:
    name: "{{ pm_install_packages }}"
    state: present
  when: pm_install_packages | length > 0
  tags:
    - package_manager
    - install

- name: Delete zypper packages
  community.general.zypper:
    name: "{{ pm_remove_packages }}"
    state: absent
  when: pm_remove_packages | length > 0
  tags:
    - package_manager
    - install

- name: Check if reboot is required on zypper systems
  ansible.builtin.stat:
    path: /boot/do_purge_kernels
  register: pkgmgr_boot_required
  tags:
    - package_manager
    - validate

- name: Display message if system needs reboot
  ansible.builtin.debug:
    msg: System needs rebooting
  when: pkgmgr_boot_required.stat.exists
  tags:
    - package_manager
    - validate

- name: Reboot system
  ansible.builtin.reboot:
    msg: Reboot initiated by Ansible for updates
    connect_timeout: 5
    reboot_timeout: 300
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: uptime
  when:
    - pm_reboot_after_update
    - pkgmgr_boot_required.stat.exists
    - ansible_connection not in ['docker', 'containers.podman.podman']
  tags:
    - package_manager
    - service
