---
# defaults file for package_manager

pm_update_system: true
pm_apt_upgrade_command: dist
pm_apk_upgrade_available: false
pm_cache_valid_time: 3600
pm_security_only: false
pm_autoremove: true
pm_purge: false
pm_gpgcheck: true
pm_disable_rhnsd: true
pm_gpgcheck_excludes: []
pm_install_packages: []
pm_remove_packages: []
pm_reboot_after_update: false
